name: islam_dunyam
description: İslam Dünyam - Kıble, Cami, Zikir ve Namaz Takibi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Kıble Pusulası
  flutter_compass: ^0.7.3
  
  # Konum Servisleri
  geolocator: ^10.1.0
  
  # Google Maps
  google_maps_flutter: ^2.10.0
  
  # HTTP İstekleri
  http: ^1.2.0
  
  # Bildirimler
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  
  # Arka Plan Servisi
  flutter_background_service: ^5.0.6
  flutter_background_service_android: ^6.2.3
  
  # İzin Yönetimi
  permission_handler: ^11.3.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # UI Yardımcıları
  flutter_svg: ^2.0.10

  # İkonlar
  cupertino_icons: ^1.0.8
  
  # Tarih/Saat
  intl: ^0.19.0

  # Sıralama
  collection: any

dependency_overrides:
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
