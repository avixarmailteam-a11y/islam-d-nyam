name: islam_dunyam
description: İslam Dünyam - Kıble, Cami, Zikir ve Namaz Takibi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Kıble Pusulası
  flutter_compass: ^0.7.3
  
  # Konum Servisleri
  geolocator: ^10.1.0
  
  # Google Maps
  google_maps_flutter: ^2.5.0
  
  # HTTP İstekleri
  http: ^1.1.0
  
  # Bildirimler
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # Arka Plan Servisi
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  
  # İzin Yönetimi
  permission_handler: ^11.1.0
  
  # State Management
  flutter_bloc: ^8.1.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Animasyonlar
  flutter_animate: ^4.3.0
  
  # UI Yardımcıları
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # İkonlar
  cupertino_icons: ^1.0.6
  
  # Tarih/Saat
  intl: ^0.18.1

  # Sıralama
  collection: ^1.18.0

dependency_overrides:
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
